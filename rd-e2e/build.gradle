// Cross-version matrix: every client version tested against every other version.
// Triangular matrix (6903 pairs total), split by weight for optimal parallelism:
//   testCrossVersionLight  - Both clients LWJGL2 or lighter: 6 parallel forks (2556 pairs)
//   testCrossVersionLwjgl3 - Heaviest client is LWJGL3: 2 forks, viewDistance=3 (1815 pairs)
//   testCrossVersionModern - Heaviest client is Modern: 2 forks, viewDistance=3 (2532 pairs)
//   testCrossVersion       - Runs all three + smoke test
//
// Run with: ./gradlew :rd-e2e:testCrossVersion -Pe2e
// Or individual weight groups: ./gradlew :rd-e2e:testCrossVersionLight -Pe2e

// Light cross-version pairs (both clients <= Netty LWJGL2).
// 7 test classes (6 non-RD shards + 1 RD class) for full parallelism.
tasks.register('testCrossVersionLight', Test) {
    useJUnitPlatform()
    onlyIf { project.hasProperty('e2e') }
    timeout = java.time.Duration.ofHours(24)
    workingDir = rootProject.projectDir
    maxParallelForks = Math.max(Runtime.runtime.availableProcessors().intdiv(2), 6)
    forkEvery = 1
    jvmArgs '-Xmx512m'
    classpath = sourceSets.test.runtimeClasspath
    testClassesDirs = sourceSets.test.output.classesDirs
    testLogging {
        showStandardStreams = true
        events 'FAILED'
        exceptionFormat 'short'
    }

    include '**/scenarios/CrossVersionLightShard*Test.class'
    include '**/scenarios/CrossVersionRdLightTest.class'
    include '**/scenarios/CrossVersionRdLightShard*Test.class'
    include '**/scenarios/CrossVersionSmokeTest.class'
}

// LWJGL3 cross-version pairs (heaviest client is 1.13-1.18.2).
// 3 test classes (2 non-RD shards + 1 RD class).
tasks.register('testCrossVersionLwjgl3', Test) {
