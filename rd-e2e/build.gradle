description = 'RDForward E2E - Visual regression tests with real Minecraft clients'

dependencies {
    testImplementation project(':rd-server')
    testImplementation project(':rd-protocol')
    testImplementation project(':rd-world')
    testImplementation 'com.github.romankh3:image-comparison:4.4.0'
}

// E2E tests require Xvfb + Java 8 + real client JARs. Skip during normal builds;
// run explicitly with: ./gradlew :rd-e2e:test -Pe2e
//
// Test tasks are split by client generation for optimal parallelism:
//   test          - Pre-1.13 (LWJGL2): lightweight, 6 parallel forks
//   testLWJGL3    - 1.13-1.18.2 (LWJGL3): Mesa llvmpipe software rendering, 4 forks
//   testModern    - 1.19+ (LWJGL3 + Core Profile): heaviest JVMs, 2 forks
//   testAll       - Runs all three suites

// Pre-1.13 clients (RubyDung, Alpha, Beta, Release 1.0-1.12, CrossVersion)
// Lightweight LWJGL2 rendering, no software GL overhead.
test {
    onlyIf { project.hasProperty('e2e') }
    timeout = java.time.Duration.ofMinutes(120)
    workingDir = rootProject.projectDir
    maxParallelForks = Math.max(Runtime.runtime.availableProcessors().intdiv(2), 6)
    forkEvery = 1
    jvmArgs '-Xmx512m'
    testLogging {
        showStandardStreams = true
        events 'FAILED'
        exceptionFormat 'short'
    }

    include '**/scenarios/RubyDung*Test.class'
    include '**/scenarios/Alpha*Test.class'
    include '**/scenarios/Beta*Test.class'
    include '**/scenarios/Release*Test.class'
    // Exclude cross-version tests — handled by testCrossVersion* tasks
    exclude '**/scenarios/CrossVersion*Test.class'
    // Exclude LWJGL3 versions (1.13+) — handled by testLWJGL3/testModern
    exclude '**/scenarios/Release113*Test.class'
    exclude '**/scenarios/Release114*Test.class'
    exclude '**/scenarios/Release115*Test.class'
    exclude '**/scenarios/Release116*Test.class'
    exclude '**/scenarios/Release117*Test.class'
    exclude '**/scenarios/Release118*Test.class'
    exclude '**/scenarios/Release119*Test.class'
    exclude '**/scenarios/Release120*Test.class'
    exclude '**/scenarios/Release121*Test.class'
}

// 1.13-1.18.2 clients (LWJGL3 with Mesa llvmpipe software rendering).
// Single fork: 1.15+'s async chunk meshing under Mesa llvmpipe software rendering
// causes unrendered chunks when multiple instances compete for CPU.
// viewDistance=3 sends 49 chunks. 1.17's LevelRenderer BFS checks hasAllNeighbors
// for sections >24 blocks from camera; the ViewArea is sized to renderDistance so
// padding chunks beyond renderDistance collide — both renderDistance AND viewDistance
// must be >= 3 so distance-2 chunks have their distance-3 neighbors in the ViewArea.
tasks.register('testLWJGL3', Test) {
    useJUnitPlatform()
    onlyIf { project.hasProperty('e2e') }
    timeout = java.time.Duration.ofMinutes(300)
    workingDir = rootProject.projectDir
    maxParallelForks = 2
    forkEvery = 1
    jvmArgs '-Xmx512m', '-De2e.viewDistance=3'
    classpath = sourceSets.test.runtimeClasspath
    testClassesDirs = sourceSets.test.output.classesDirs
    testLogging {
        showStandardStreams = true
        events 'FAILED'
        exceptionFormat 'short'
    }

    include '**/scenarios/Release113*Test.class'
    include '**/scenarios/Release114*Test.class'
    include '**/scenarios/Release115*Test.class'
    include '**/scenarios/Release116*Test.class'
    include '**/scenarios/Release117*Test.class'
    include '**/scenarios/Release118*Test.class'
}

// 1.19+ clients (LWJGL3 + Core Profile, heaviest JVMs with DataFixerUpper).
// Single fork: 1.15+'s async chunk meshing under Mesa llvmpipe software rendering
// causes unrendered chunks when multiple instances compete for CPU.
tasks.register('testModern', Test) {
    useJUnitPlatform()
    onlyIf { project.hasProperty('e2e') }
    timeout = java.time.Duration.ofMinutes(300)
    workingDir = rootProject.projectDir
    maxParallelForks = 2
    forkEvery = 1
    jvmArgs '-Xmx512m', '-De2e.viewDistance=3'
    classpath = sourceSets.test.runtimeClasspath
    testClassesDirs = sourceSets.test.output.classesDirs
    testLogging {
        showStandardStreams = true
        events 'FAILED'
        exceptionFormat 'short'
    }

    include '**/scenarios/Release119*Test.class'
    include '**/scenarios/Release120*Test.class'
    include '**/scenarios/Release121*Test.class'
}

