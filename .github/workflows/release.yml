name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache BuildTools downloads
        uses: actions/cache@v4
        with:
          path: |
            rd-game/build/download
            rd-game/build/tools
          key: buildtools-rd-132211-vf1.11.2

      - name: Set up workspace
        run: ./gradlew :rd-game:setupWorkspace

      - name: Build
        run: ./gradlew build -x :rd-bot:test

      - name: Build server fat JAR
        run: ./gradlew :rd-server:fatJar -PprojectVersion=${{ github.ref_name }}

      - name: Rename server JAR
        run: mv rd-server/build/libs/rd-server-${{ github.ref_name }}-all.jar rd-server/build/libs/rdforward-server-${{ github.ref_name }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: rd-server/build/libs/rdforward-server-${{ github.ref_name }}.jar
          body: |
            ## Downloads

            **`rdforward-server-${{ github.ref_name }}.jar`** — Standalone server JAR (Java 8+). Run with:
            ```bash
            java -jar rdforward-server-${{ github.ref_name }}.jar
            ```
            Ports: TCP 25565 (Java Edition), UDP 19132 (Bedrock Edition)

            ## Building the Game Client

            Due to copyright restrictions, pre-built game JARs are not included.
            RDForward uses a **BuildTools** approach (like Spigot) where the original
            RubyDung code is downloaded and decompiled on your machine.

            ```bash
            git clone https://github.com/martinambrus/RDForward.git
            cd RDForward
            git checkout ${{ github.ref_name }}

            # First-time setup: downloads rd-132211 from Mojang, decompiles, applies patches
            ./gradlew :rd-game:setupWorkspace

            # Build everything
            ./gradlew build

            # Launch the game
            ./gradlew :rd-game:runClient
            ```

            ### Requirements
            - Java 21+ (for building the client)
            - Java 8+ (for running the server)
            - Internet connection (first build only, to download rd-132211.jar from Mojang)
